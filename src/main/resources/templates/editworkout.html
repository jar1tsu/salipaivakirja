<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fi">
<head>
    <meta charset="UTF-8" />
    <title>Muokkaa treeniä</title>
    <style>
        body { font-family: system-ui, Arial, sans-serif; margin: 2rem; }
    </style>
</head>
<body>

<h1>Muokkaa treeniä</h1>

<form th:action="@{'/workouts/update/' + ${workout.id}}" th:object="${workout}" method="post">
    <div>
        <label for="date">Päivämäärä:</label>
        <input type="date" id="date" th:field="*{date}" required />
    </div>
    <div>
        <label for="durationMin">Kesto (min):</label>
        <input type="number" id="durationMin" th:field="*{durationMin}" />
    </div>
    <div>
        <label for="notes">Muistiinpanot:</label>
        <textarea id="notes" th:field="*{notes}"></textarea>
    </div>
    <div>
        <button type="submit">Tallenna</button>
        <a th:href="@{/workouts}">Peruuta</a>
    </div>
</form>

</body>
</html>
